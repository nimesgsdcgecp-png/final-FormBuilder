spring.application.name=formbuilder2

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/formbuilder3?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
# STRICTLY VALIDATE schema. Do not let Hibernate change the DB structure automatically.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Naming Strategy (Maps javaField -> java_field)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Jackson (JSON) Configuration
# Ensure Enums (like 'TEXT', 'NUMERIC') are serialized as Strings, not Numbers
spring.jackson.serialization.write-enums-using-to-string=true

spring.data.web.pageable.serialization-mode=via-dto

# Session Security
server.servlet.session.timeout=15m



# SRS Limits & Guardrails (Section 10)
formbuilder.limits.max-fields-per-form=50
formbuilder.limits.max-validations-per-form=100
formbuilder.limits.max-pages-per-form=10
formbuilder.limits.max-payload-size-kb=100

# File Upload Limits (SRS Section 10)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

