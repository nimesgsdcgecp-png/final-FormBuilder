# ==========================================
# SPRING AI CONFIGURATION (OLLAMA / GROQ)
# ==========================================
# To swap between Local Ollama and Cloud Groq, simply comment/uncomment the blocks below.
# Because Ollama supports the generic OpenAI specification natively on /v1, 
# we can use the spring-ai-openai module for both!

# --- GROQ CONFIGURATION (Cloud) ---
spring.ai.openai.api-key=
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.1

# --- OLLAMA CONFIGURATION (Local) ---
# spring.ai.openai.api-key=dummy-key-not-needed
# spring.ai.openai.base-url=http://localhost:11434
# spring.ai.openai.chat.options.model=mistral:latest
# spring.ai.openai.chat.options.temperature=0.1

# ai architect modules
feature.ai.enabled=true

# workflow modules
feature.workflow.enabled=true

# rules modules
feature.rules.enabled=true

# Application URLs
app.frontend.url=http://localhost:3000

# ==========================================
# SWAGGER / SPRINGDOC OPENAPI CONFIGURATION
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
