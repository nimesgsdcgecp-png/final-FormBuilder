<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1d23;
            font-family: 'Inter', sans-serif;
        }
        .glassmorphism {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container mx-auto p-4 mt-10 glassmorphism">
        <h1 class="text-2xl text-white mb-4">Dynamic Form</h1>
        <form id="dynamic-form">
            <!-- Form fields will be rendered here -->
        </form>
        <button id="submit-button" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded">Submit</button>
        <div id="error-message" class="text-red-500 mt-4"></div>
        <div id="success-message" class="text-green-500 mt-4"></div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8080';
        const FORM_CODE = 'user_detail_form';
        const formFields = [];
        let formData = {};

        // Fetch form schema
        fetch(`${BASE_URL}/api/v1/runtime/forms/${FORM_CODE}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error(response.statusText);
                }
                return response.json();
            })
            .then(data => {
                const fields = data.fields;
                fields.forEach(field => {
                    formFields.push(field);
                    formData[field.columnName] = '';
                });
                renderFormFields();
            })
            .catch(error => {
                console.error(error);
                document.getElementById('error-message').innerText = 'Error fetching form schema';
            });

        // Render form fields
        function renderFormFields() {
            const form = document.getElementById('dynamic-form');
            formFields.forEach(field => {
                const fieldElement = document.createElement('div');
                fieldElement.classList.add('mb-4');
                if (field.type === 'TEXT') {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = field.label;
                    input.classList.add('w-full', 'p-2', 'border', 'border-gray-400', 'rounded');
                    input.oninput = () => {
                        formData[field.columnName] = input.value;
                    };
                    fieldElement.appendChild(input);
                } else if (field.type === 'TEXTAREA') {
                    const textarea = document.createElement('textarea');
                    textarea.placeholder = field.label;
                    textarea.classList.add('w-full', 'p-2', 'border', 'border-gray-400', 'rounded');
                    textarea.oninput = () => {
                        formData[field.columnName] = textarea.value;
                    };
                    fieldElement.appendChild(textarea);
                } else if (field.type === 'DROPDOWN') {
                    const select = document.createElement('select');
                    select.classList.add('w-full', 'p-2', 'border', 'border-gray-400', 'rounded');
                    select.onchange = () => {
                        formData[field.columnName] = select.value;
                    };
                    const option = document.createElement('option');
                    option.value = '';
                    option.text = field.label;
                    select.appendChild(option);
                    // Add options dynamically
                    field.options.forEach(option => {
                        const optionElement = document.createElement('option');
                        optionElement.value = option.value;
                        optionElement.text = option.text;
                        select.appendChild(optionElement);
                    });
                    fieldElement.appendChild(select);
                } else if (field.type === 'BOOLEAN') {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.classList.add('mr-2');
                    checkbox.onchange = () => {
                        formData[field.columnName] = checkbox.checked;
                    };
                    fieldElement.appendChild(checkbox);
                    const label = document.createElement('span');
                    label.innerText = field.label;
                    fieldElement.appendChild(label);
                }
                form.appendChild(fieldElement);
            });
        }

        // Submit form data
        document.getElementById('submit-button').onclick = () => {
            const submissionData = {
                data: formData,
                status: 'FINAL'
            };
            fetch(`${BASE_URL}/api/v1/runtime/forms/${FORM_CODE}/submissions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(submissionData)
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(response.statusText);
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('success-message').innerText = 'Form submitted successfully';
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById('error-message').innerText = 'Error submitting form';
                });
        };
    </script>
</body>
</html>
